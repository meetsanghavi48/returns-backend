<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BLAKC Returns</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #F9F9F9;
  --card: #FFFFFF;
  --border: #E5E5E5;
  --text: #000000;
  --muted: #666666;
  --accent: #000000;
  --exchange: #1A1A1A;
  --success: #15803D;
  --warn: #D97706;
  --font: 'DM Sans', sans-serif;
  --serif: 'DM Serif Display', serif;
  --radius: 8px;
  --shadow: 0 4px 16px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.shell{max-width:520px;margin:0 auto;padding:16px 16px 80px}
.logo{text-align:center;padding:20px 0 10px;font-family:var(--serif);font-size:24px;color:var(--text); letter-spacing: 1px; text-transform: uppercase;}
.step-bar{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:20px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.step-dot.active{background:var(--accent);width:24px;border-radius:4px}
.step-dot.done{background:var(--success)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-family:var(--serif);font-size:18px;margin-bottom:4px}
.card-sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.inp{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:6px;font-size:15px;font-family:var(--font);background:#fff;transition:.2s}
.inp:focus{outline:none;border-color:var(--accent)}
.inp.err{border-color:var(--accent)}
.label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.btn{width:100%;padding:14px;border-radius:6px;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:.2s}
.btn-black{background:var(--text);color:#fff}
.btn-black:hover{opacity:.88}
.btn-black:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--text)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:6px;font-weight:600;cursor:pointer;border:none}
.btn-sm-outline{padding:7px 14px;font-size:13px;border-radius:6px;font-weight:600;cursor:pointer;background:none;border:1px solid var(--border);color:var(--text)}
.err-msg{color:var(--accent);font-size:13px;margin-top:6px}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Item row */
.item-row{display:flex;gap:12px;align-items:flex-start;padding:14px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;cursor:pointer;transition:.2s;position:relative}
.item-row.selected{border-color:var(--accent);background:rgba(0,0,0,.02)}
.item-img{width:60px;height:60px;object-fit:cover;border-radius:4px;flex-shrink:0;border:1px solid var(--border)}
.item-img-ph{width:60px;height:60px;background:#f3f4f6;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.item-check{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;background:#fff}
.item-check.checked{background:var(--accent);border-color:var(--accent);color:#fff}
.item-title{font-size:14px;font-weight:600;margin-bottom:2px}
.item-variant{font-size:12px;color:var(--muted)}
.item-price{font-size:13px;font-weight:600;color:var(--text);margin-top:3px}
.action-pills{display:flex;gap:8px;margin-top:10px}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;transition:.2s}
.pill.active-ret{background:#000;border-color:#000;color:#fff}
.pill.active-exch{background:#333;border-color:#333;color:#fff}

/* Revenue fork cards */
.fork-option{display:flex;gap:14px;align-items:flex-start;padding:16px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;cursor:pointer;transition:.2s}
.fork-option:hover{border-color:var(--text)}
.fork-option.selected{border-color:var(--accent);background:rgba(0,0,0,.03)}
.fork-icon{font-size:26px;flex-shrink:0;margin-top:2px}
.fork-title{font-size:14px;font-weight:700;margin-bottom:2px}
.fork-sub{font-size:12px;color:var(--muted);line-height:1.5}
.fork-badge{font-size:10px;padding:2px 7px;background:#e5e5e5;color:#000;border-radius:4px;font-weight:700;margin-left:6px}

/* Qty selector */
.qty-row{display:flex;align-items:center;gap:10px}
.qty-btn{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.qty-val{font-size:16px;font-weight:700;min-width:24px;text-align:center}

/* Opt selector */
.opt-group{margin-bottom:12px}
.opt-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.opt-pills{display:flex;flex-wrap:wrap;gap:6px}
.opt-pill{padding:6px 14px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;transition:.2s}
.opt-pill.selected{border-color:var(--accent);background:#000;color:#fff;font-weight:700}
.opt-pill.unavail{opacity:.4;cursor:not-allowed;text-decoration:line-through}

/* Address modal */
.addr-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:none;align-items:flex-end;justify-content:center}
.addr-modal-bg.open{display:flex}
.addr-modal{background:#fff;border-radius:12px 12px 0 0;width:100%;max-width:520px;padding:24px;max-height:90vh;overflow-y:auto}
.addr-modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.addr-inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.addr-inp-full{grid-column:span 2}
.addr-inp-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;display:block}
</style>
</head>
<body>
<div class="shell" id="root"></div>

<div class="addr-modal-bg" id="addr-edit-modal">
  <div class="addr-modal">
    <div class="addr-modal-title">
      <span>📍 Edit Pickup Address</span>
      <button onclick="closeAddrModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div class="addr-inp-grid">
      <div class="addr-inp-full"><label class="addr-inp-lbl">Full Name</label><input class="inp" id="am-name"></div>
      <div class="addr-inp-full"><label class="addr-inp-lbl">Address Line 1 <span style="color:var(--accent)">*</span></label><input class="inp" id="am-addr1"></div>
      <div class="addr-inp-full"><label class="addr-inp-lbl">Address Line 2</label><input class="inp" id="am-addr2"></div>
      <div><label class="addr-inp-lbl">City <span style="color:var(--accent)">*</span></label><input class="inp" id="am-city"></div>
      <div><label class="addr-inp-lbl">State <span style="color:var(--accent)">*</span></label><input class="inp" id="am-state"></div>
      <div><label class="addr-inp-lbl">Pincode <span style="color:var(--accent)">*</span></label><input class="inp" id="am-zip" maxlength="6"></div>
      <div><label class="addr-inp-lbl">Phone</label><input class="inp" id="am-phone"></div>
    </div>
    <div id="am-err" style="color:var(--accent);font-size:13px;margin-top:8px;display:none"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-outline" style="flex:.4" onclick="closeAddrModal()">Cancel</button>
      <button class="btn btn-black" style="flex:1" onclick="saveAddrModal()">Save Address</button>
    </div>
  </div>
</div>

<script>
const BACKEND = (()=>{
  if(window.location.hostname !== 'localhost' && !window.location.hostname.includes('127.0.0.1')) return window.location.origin;
  return 'https://returns-backend.onrender.com';
})();

const S = { screen: 'lookup', order: null, contact: '', checked: new Set(), actions: {}, qtys: {}, reasons: {}, media: {}, mediaUrls: {}, exchangeOpts: {}, exchangeVariant: {}, exchangeProduct: {}, queue: [], qIdx: 0, processed: [], refundMethod: null, logistics: 'pickup', address: null, prodData: {}, searchResults: [], diffProdSearch: '', diffProd: null, is_cod: false, loading: false, error: '' };
const REASONS = { default: ['Size Issue','Wrong Item Received','Defective / Damaged','Changed My Mind','Quality Issue'], apparel: ['Too Small','Too Large','Wrong Colour','Fabric Quality','Stitching Issue','Wrong Item Received','Defective','Changed My Mind'] };

function render() {
  const root = document.getElementById('root'); root.innerHTML = '';
  const el = document.createElement('div'); el.className = 'fade-in';
  switch(S.screen) {
    case 'lookup': el.innerHTML = renderLookup(); break;
    case 'order': el.innerHTML = renderOrder(); break;
    case 'process': el.innerHTML = renderProcess(); break;
    case 'refund': el.innerHTML = renderRefundFork(); break;
    case 'logistics': 
      if(!S.address && S.order) { const src = S.order.address || S.order.shipping_address; if(src && (src.address1 || src.city)) S.address = src; }
      el.innerHTML = renderLogistics(); break;
    case 'success': el.innerHTML = renderSuccess(); break;
  }
  root.appendChild(el);
}

function steps(active) { return `<div class="step-bar">${[1,2,3,4].map((n,i)=>`<div class="step-dot ${active>i?'done':active===i?'active':''}"></div>`).join('')}</div>`; }
function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderLookup() {
  return `
  <div class="logo">BLAKC Returns</div>
  <div class="card">
    <div class="card-title">Start your return</div>
    <div class="card-sub">Enter your order details to get started</div>
    <div style="margin-bottom:12px"><label class="label">Order Number</label><input class="inp" id="inp-order" placeholder="e.g. 1001" value="${escHtml(S.orderNum||'')}"></div>
    <div style="margin-bottom:16px"><label class="label">Email or Phone</label><input class="inp" id="inp-contact" placeholder="Email or 10-digit phone" value="${escHtml(S.contact||'')}"></div>
    ${S.error?`<div class="err-msg">⚠ ${escHtml(S.error)}</div>`:''}
    <button class="btn btn-black" onclick="doLookup()" style="margin-top:12px" ${S.loading?'disabled':''}>${S.loading?'Looking up…':'Continue →'}</button>
  </div>`;
}

function renderOrder() {
  const o = S.order;
  const eligibleItems = (o.line_items||[]).filter(li => !li.non_returnable);
  let itemsHTML = eligibleItems.map((item, idx) => {
    const checked = S.checked.has(idx), action = S.actions[idx];
    const img = item.image_url ? `<img class="item-img" src="${item.image_url}">` : `<div class="item-img-ph">👕</div>`;
    return `<div class="item-row ${checked?'selected':''}" onclick="toggleCheck(${idx})">
      <div class="item-check ${checked?'checked':''}">${checked?'✓':''}</div>${img}
      <div style="flex:1"><div class="item-title">${escHtml(item.title)}</div>${item.variant_title?`<div class="item-variant">${escHtml(item.variant_title)}</div>`:''}
        <div class="item-price">₹${parseFloat(item.price||0).toFixed(2)} × ${item.quantity}</div>
        ${checked?`<div class="action-pills" onclick="event.stopPropagation()">
          <span class="pill ${action==='return'?'active-ret':''}" onclick="setAction(${idx},'return')">↩ Return</span>
          <span class="pill ${action==='exchange'?'active-exch':''}" onclick="setAction(${idx},'exchange')">🔄 Exchange</span>
        </div>`:''}
      </div></div>`;
  }).join('');
  return `<div class="logo">BLAKC Returns</div>${steps(1)}
  <div class="card"><div class="card-title">Order #${o.order_number}</div><div class="card-sub">Select items to return or exchange</div>${itemsHTML}</div>
  <button class="btn btn-black" ${S.checked.size===0?'disabled':''} onclick="buildQueue()">Continue with ${S.checked.size} items →</button>`;
}

function renderProcess() {
  if (S.qIdx >= S.queue.length) { 
    if(S.queue.some(q=>q.action==='return')) { S.screen='refund'; render(); return ''; } 
    else { S.screen='logistics'; render(); return ''; } 
  }
  const { idx, item, action } = S.queue[S.qIdx];
  const qNum = S.qIdx+1, total = S.queue.length, reason = S.reasons[idx]||'', qty = S.qtys[idx]||1;
  const reasons = (item?.title||'').toLowerCase().includes('shirt')||(item?.title||'').toLowerCase().includes('cargo') ? REASONS.apparel : REASONS.default;

  if (action === 'return') {
    return `<div class="logo">BLAKC Returns</div>${steps(2)}
    <div class="card"><div class="item-row" style="cursor:default"><img class="item-img" src="${item.image_url||''}"><div style="flex:1"><div class="item-title">${escHtml(item.title)}</div></div></div>
      <div style="margin-bottom:14px"><label class="label">Quantity</label><div class="qty-row"><button class="qty-btn" onclick="changeQty(${idx},-1)">−</button><span class="qty-val">${qty}</span><button class="qty-btn" onclick="changeQty(${idx},1)">+</button></div></div>
      <div style="margin-bottom:14px"><label class="label">Reason</label><select class="inp" onchange="S.reasons[${idx}]=this.value;render()"><option value="">Select reason...</option>${reasons.map(r=>`<option value="${r}" ${reason===r?'selected':''}>${r}</option>`).join('')}</select></div>
    </div>
    <div style="display:flex;gap:10px"><button class="btn btn-outline" style="flex:.4" onclick="prevItem()">Back</button><button class="btn btn-black" style="flex:1" onclick="nextItem(${idx})" ${!reason?'disabled':''}>Continue</button></div>`;
  }
  
  const prod = S.prodData[idx], selOpts = S.exchangeOpts[idx]||{}, selVariant = S.exchangeVariant[idx]||null;
  let picker = '';
  if (prod) {
    picker = (prod.options||[]).map(opt => `<div class="opt-group"><div class="opt-title">${escHtml(opt.name)}</div><div class="opt-pills">${[...new Set((prod.variants||[]).map(v=>v[`option${opt.position}`]).filter(Boolean))].map(v=>{
      const avail = (prod.variants||[]).some(vr=>vr[`option${opt.position}`]===v && vr.available!==false);
      return `<span class="opt-pill ${selOpts[opt.name]===v?'selected':''} ${!avail?'unavail':''}" onclick="${avail?`selectOpt(${idx},'${opt.name}','${v}')`:''}">${v}</span>`;
    }).join('')}</div></div>`).join('');
  } else { picker = `Loading variants...`; fetchVariants(idx, item.product_id); }

  return `<div class="logo">BLAKC Returns</div>${steps(2)}
  <div class="card"><div class="item-row" style="cursor:default"><img class="item-img" src="${item.image_url||''}"><div style="flex:1"><div class="item-title">${escHtml(item.title)}</div><div class="item-variant">Exchanging ${escHtml(item.variant_title)}</div></div></div>${picker}</div>
  <div style="display:flex;gap:10px"><button class="btn btn-outline" style="flex:.4" onclick="prevItem()">Back</button><button class="btn btn-black" style="flex:1" onclick="nextItem(${idx})" ${!selVariant?'disabled':''}>Continue</button></div>`;
}

function renderRefundFork() {
  const o = S.order, isCOD = S.is_cod || ['cash_on_delivery','cod'].includes((o.payment_gateway||'').toLowerCase());
  const total = S.queue.filter(q=>q.action==='return').reduce((s,q)=>s+parseFloat(q.item.price||0)*(S.qtys[q.idx]||1),0);
  const creditAmt = (total + (total*(o.store_credit_bonus||10)/100)).toFixed(2);
  
  return `<div class="logo">BLAKC Returns</div>${steps(2)}
  <div class="card"><div class="card-title">Refund Method</div><div class="card-sub">Choose what you'd like us to do with your ₹${total.toFixed(2)}</div>
    <div class="fork-option ${S.refundMethod==='store_credit'?'selected':''}" onclick="S.refundMethod='store_credit';render()"><span class="fork-icon">🎁</span><div><div class="fork-title">Store Credit <span class="fork-badge">+${o.store_credit_bonus||10}% BONUS</span></div><div class="fork-sub">Get ₹${creditAmt} to use on anything in our store</div></div></div>
    ${isCOD ? `<div style="opacity:.4;padding:16px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px"><div class="fork-title">Original Payment (Not available for COD)</div></div>` 
            : `<div class="fork-option ${S.refundMethod==='original'?'selected':''}" onclick="S.refundMethod='original';render()"><span class="fork-icon">💳</span><div><div class="fork-title">Refund to Bank</div><div class="fork-sub">5–7 business days to reflect</div></div></div>`}
  </div>
  <div style="display:flex;gap:10px"><button class="btn btn-outline" style="flex:.4" onclick="S.screen='process';S.qIdx=S.queue.length-1;render()">Back</button><button class="btn btn-black" style="flex:1" ${!S.refundMethod?'disabled':''} onclick="S.screen='logistics';render()">Continue</button></div>`;
}

function renderLogistics() {
  const addr = S.address;
  return `<div class="logo">BLAKC Returns</div>${steps(3)}
  <div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-size:14px;font-weight:700">📍 Pickup Address</div><button onclick="editAddress()" style="font-size:12px;font-weight:600;color:#000;background:none;border:1px solid #000;padding:4px 12px;border-radius:4px;cursor:pointer">Edit</button></div>
    ${addr&&(addr.address1||addr.city)?`<div style="background:#f9fafb;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:13px;line-height:1.6">${[addr.name,addr.address1,addr.city,addr.zip].filter(Boolean).map(escHtml).join('<br>')}</div>`:`<div style="padding:14px;border:2px dashed var(--border);text-align:center"><button onclick="editAddress()" class="btn btn-black">+ Add Address</button></div>`}
  </div>
  <div style="display:flex;gap:10px"><button class="btn btn-outline" style="flex:.4" onclick="S.screen='refund';render()">Back</button><button class="btn btn-black" style="flex:1" id="btn-submit" onclick="submitRequest()">Submit Request</button></div>`;
}

function renderSuccess() {
  return `<div class="logo">BLAKC Returns</div>${steps(4)}
  <div class="card" style="text-align:center;padding:32px 20px"><div style="font-size:48px;margin-bottom:12px">✅</div><div style="font-family:var(--serif);font-size:22px;margin-bottom:8px">Request Submitted</div><div style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:20px">Your request has been received. Our courier will contact you to schedule pickup.</div>
    <button class="btn btn-black" onclick="S.screen='lookup';render()">Start Over</button>
  </div>`;
}

/* Scripts logic */
async function doLookup() {
  const orderNum = document.getElementById('inp-order')?.value, contact = document.getElementById('inp-contact')?.value;
  if(!orderNum||!contact) { S.error='Order number and Email/Phone required.'; render(); return; }
  S.orderNum=orderNum; S.contact=contact; S.loading=true; render();
  try {
    const res = await fetch(`${BACKEND}/api/lookup?order_number=${orderNum}&contact=${contact}`).then(r=>r.json());
    S.loading=false;
    if (!res.found) { S.error='Order not found or contact mismatch.'; render(); return; }
    S.order = res.order; S.is_cod = res.order.is_cod;
    const a = res.order.address; if(a) S.address = {name:a.name, address1:a.address1, city:a.city, province:a.province, zip:a.zip, phone:a.phone};
    S.screen = 'order'; render();
  } catch(e) { S.loading=false; S.error='Network error.'; render(); }
}

function toggleCheck(idx) { if (S.checked.has(idx)) { S.checked.delete(idx); delete S.actions[idx]; } else { S.checked.add(idx); S.actions[idx]='return'; } render(); }
function setAction(idx, action) { S.actions[idx]=action; render(); }
function changeQty(idx, delta) { S.qtys[idx] = Math.max(1, Math.min(S.order.line_items[idx].quantity, (S.qtys[idx]||1)+delta)); render(); }
function buildQueue() { S.queue = [...S.checked].sort().map(idx => ({ idx, item:S.order.line_items[idx], action:S.actions[idx] })); S.qIdx = 0; S.screen='process'; render(); }
function nextItem(idx) { S.qIdx++; render(); }
function prevItem() { if (S.qIdx > 0) { S.qIdx--; } else { S.screen='order'; } render(); }
async function fetchVariants(idx, pid) { if (S.prodData[idx]) return; try { S.prodData[idx] = await fetch(`${BACKEND}/api/products/${pid}`).then(r=>r.json()); render(); } catch(e) {} }
function selectOpt(idx, opt, val) { 
  if(!S.exchangeOpts[idx]) S.exchangeOpts[idx]={}; S.exchangeOpts[idx][opt]=val; 
  const p = S.prodData[idx]; S.exchangeVariant[idx] = p.variants.find(v => p.options.every(o => !S.exchangeOpts[idx][o.name] || v[`option${o.position}`]===S.exchangeOpts[idx][o.name]))||null; render(); 
}

function editAddress() { document.getElementById('addr-edit-modal').classList.add('open'); const a = S.address||{}; ['name','addr1','addr2','city','state','zip','phone'].forEach(k=>document.getElementById('am-'+k).value=a[k==='addr1'?'address1':k==='state'?'province':k]||''); }
function closeAddrModal() { document.getElementById('addr-edit-modal').classList.remove('open'); }
function saveAddrModal() { S.address = {name:document.getElementById('am-name').value, address1:document.getElementById('am-addr1').value, city:document.getElementById('am-city').value, province:document.getElementById('am-state').value, zip:document.getElementById('am-zip').value, phone:document.getElementById('am-phone').value, country:'India'}; closeAddrModal(); render(); }

async function submitRequest() {
  document.getElementById('btn-submit').disabled=true;
  const items = S.queue.map(q => ({ id: q.item.id, title: q.item.title, variant_id: q.item.variant_id, price: q.item.price, action: q.action, qty: S.qtys[q.idx]||1, reason: S.reasons[q.idx]||'', exchange_variant_id: S.exchangeVariant[q.idx]?.id, exchange_variant_title: S.exchangeVariant[q.idx]?.title }));
  try {
    const res = await fetch(`${BACKEND}/api/returns/request`,{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ order_id: S.order.id, order_number: S.order.order_number, items, refund_method: S.refundMethod||'store_credit', address: S.address, shipping_preference: 'pickup' }) }).then(r=>r.json());
    if (res.success) { S.screen='success'; render(); } else { alert('Error: '+res.error); document.getElementById('btn-submit').disabled=false; }
  } catch(e) { alert('Network error'); document.getElementById('btn-submit').disabled=false; }
}

render();
</script>
</body>
</html>
