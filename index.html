<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Returns Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F5F7;--card:#FFFFFF;--border:#E5E7EB;--text:#111827;--muted:#6B7280;--muted2:#9CA3AF;
  --primary:#16A34A;--primary-bg:#DCFCE7;--primary-light:#F0FDF4;
  --blue:#2563EB;--blue-bg:#DBEAFE;--amber:#D97706;--amber-bg:#FEF3C7;
  --red:#DC2626;--red-bg:#FEE2E2;--purple:#7C3AED;--purple-bg:#EDE9FE;
  --font:'Plus Jakarta Sans',sans-serif;--sidebar:236px;--topbar:56px;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}
#sidebar{width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo-icon{width:34px;height:34px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.sb-group{padding:16px 12px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;margin:1px 6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:.12s;text-decoration:none}
.sb-item:hover{background:#F9FAFB;color:var(--text)}
.sb-item.active{background:var(--primary-bg);color:var(--primary);font-weight:600}
.sb-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;min-width:20px;text-align:center}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.tb-title{font-size:16px;font-weight:700;flex:1}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:.12s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#15803d}
.btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:#9CA3AF;background:#F9FAFB}
.btn-danger{background:var(--red-bg);border:1px solid #FECACA;color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12px}
.pg-wrap{flex:1;overflow-y:auto;padding:22px 24px}
.pg-hidden{display:none!important}
.pg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pg-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
.pg-sub{font-size:13px;color:var(--muted);margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;margin-top:3px}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted2);text-align:left;border-bottom:1px solid var(--border)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
tbody tr:hover td{background:#FAFAFA;cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill.pending{background:var(--amber-bg);color:var(--amber)}.pill.approved,.pill.fulfilled{background:var(--primary-bg);color:var(--primary)}.pill.rejected{background:var(--red-bg);color:var(--red)}.pill.exchange-pending{background:var(--blue-bg);color:var(--blue)}.pill.refunded{background:#F3F4F6;color:var(--muted)}
/* Rule builder specific */
#auto-builder-view .dp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.inp-field{padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:13px;color:var(--text);width:100%;}
.inp-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:4px;display:block}
.inp-wrap{margin-bottom:10px}
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.cond-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:12px;margin:2px 3px 2px 0}
#toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(6px);transition:.25s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0)} #toast.success{background:var(--primary);color:#fff} #toast.error{background:var(--red);color:#fff} #toast.ok{background:#111827;color:#fff}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-logo"><div class="sb-logo-icon">↩</div><div><div class="sb-logo-name">Returns</div><div class="sb-logo-sub">Manager v3</div></div></div>
  <div class="sb-group">Returns</div>
  <a class="sb-item active" id="nav-returns" onclick="showPage('returns')">📋 Requests <span class="sb-badge" id="badge-ret">0</span></a>
  <a class="sb-item" id="nav-rules" onclick="showPage('rules')">⚡ Automation</a>
  <a class="sb-item" id="nav-settings" onclick="showPage('settings')">⚙️ Settings</a>
</div>

<div id="main">
  <div id="topbar"><div class="tb-title" id="topbar-title">Return Requests</div></div>

  <div class="pg-wrap" id="pg-returns">
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-top"><div><div class="stat-val" id="st-total">—</div><div class="stat-label">Total</div></div></div></div>
      <div class="stat-card"><div class="stat-top"><div><div class="stat-val" id="st-pending">—</div><div class="stat-label">Pending</div></div></div></div>
    </div>
    <div class="tbl-wrap">
      <div id="ret-table-wrap" style="padding: 20px; text-align: center; color: var(--muted)">Loading...</div>
    </div>
  </div>

  <div class="pg-wrap pg-hidden" id="pg-rules">
    <div id="auto-list-view">
      <div class="pg-header">
        <div><div class="pg-title">⚡ Automation Rules</div><div class="pg-sub">Automate approvals, refunds, and exchanges.</div></div>
        <button class="btn btn-primary" onclick="openBuilder()">+ New Rule</button>
      </div>
      <div id="rules-list"></div>
    </div>

    <div id="auto-builder-view" style="display:none">
      <div class="pg-header">
        <div style="display:flex;align-items:center;gap:12px"><button class="btn btn-outline" onclick="closeBuilder()">← Back</button><div class="pg-title" id="builder-title">New Automation Rule</div></div>
        <button class="btn btn-primary" onclick="saveRule()">💾 Save Rule</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 340px;gap:18px">
        <div>
          <div class="dp-card">
            <div class="inp-wrap"><label class="inp-lbl">Rule Name</label><input class="inp-field" id="rm-name"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div class="inp-wrap"><label class="inp-lbl">Category</label><select class="inp-field" id="rm-category"><option value="on_submit">On Submit</option><option value="on_carrier">On Carrier Event</option></select></div>
              <div class="inp-wrap"><label class="inp-lbl">Priority</label><input class="inp-field" id="rm-priority" type="number" min="1" value="1"></div>
            </div>
          </div>

          <div class="dp-card">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px">
              <div style="font-weight:700">Conditions</div>
              <select class="inp-field" id="rm-matchmode" style="width:120px" onchange="renderConditions()"><option value="all">Match ALL</option><option value="any">Match ANY</option></select>
            </div>
            <div id="rm-conditions-wrap"></div>
            <button class="btn btn-outline btn-sm" style="margin-top:10px;width:100%" onclick="addCondition()">+ Add Condition</button>
          </div>

          <div class="dp-card">
            <div class="inp-wrap"><label class="inp-lbl">Action</label>
              <select class="inp-field" id="rm-action" onchange="renderActionParams()">
                <option value="auto_approve">Approve Request</option><option value="keep_it">Keep It (Refund w/o Return)</option>
                <option value="auto_exchange">Create Exchange Order</option><option value="flag_review">Flag for Review</option>
              </select>
            </div>
            <div id="rm-action-params"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="pg-wrap pg-hidden" id="pg-settings">
    <div class="pg-header"><div class="pg-title">Settings</div><button class="btn btn-primary" onclick="saveSettings()">Save</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="dp-card"><div class="inp-wrap"><label class="inp-lbl">Return window (days)</label><input class="inp-field" id="set-window" type="number" value="30"></div></div>
      <div class="dp-card"><div class="inp-wrap"><label class="inp-lbl">Store Credit Bonus (%)</label><input class="inp-field" id="set-bonus" type="number" value="10"></div></div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
const BACKEND = (()=>{ if(window.location.hostname!=='localhost'&&!window.location.hostname.includes('127.0.0.1')) return window.location.origin; return 'https://returns-backend.onrender.com'; })();

let ALL_ORDERS=[], RET_ORDERS=[], RULES_DATA=[];
let editRuleId=null, tempConditions=[];

async function init() { await loadOrders(); await loadRules(); }

function showPage(p) { document.querySelectorAll('.pg-wrap').forEach(el=>el.classList.add('pg-hidden')); document.getElementById('pg-'+p).classList.remove('pg-hidden'); document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active')); document.getElementById('nav-'+p).classList.add('active'); }

async function loadOrders() {
  try {
    const data = await fetch(BACKEND+'/api/orders').then(r=>r.json());
    ALL_ORDERS = data.orders||[]; RET_ORDERS = ALL_ORDERS.filter(o=>o.return_status);
    document.getElementById('st-total').textContent = RET_ORDERS.length;
    document.getElementById('st-pending').textContent = RET_ORDERS.filter(o=>o.return_status==='pending'||o.return_status==='exchange-pending').length;
    renderRetTable();
  } catch(e) {}
}

function renderRetTable() {
  const rows = RET_ORDERS.map(o=>`<tr><td>#${o.order_number}</td><td>${o.customer_name||'Guest'}</td><td>${o.request_type}</td><td><span class="pill ${o.return_status}">${o.return_status}</span></td></tr>`).join('');
  document.getElementById('ret-table-wrap').innerHTML = `<table><thead><tr><th>Order</th><th>Customer</th><th>Type</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── BUILDER LOGIC ──
async function loadRules() { try { const data = await fetch(BACKEND+'/api/rules').then(r=>r.json()); RULES_DATA=data.rules||[]; renderRules(); } catch(e){} }
function renderRules() {
  document.getElementById('rules-list').innerHTML = RULES_DATA.map(r=>`<div class="rule-card"><div style="display:flex;justify-content:space-between"><span style="font-weight:700">${r.name}</span><button class="btn btn-sm btn-outline" onclick="openBuilder('${r.id}')">Edit</button></div></div>`).join('');
}

function openBuilder(id) {
  document.getElementById('auto-list-view').style.display = 'none'; document.getElementById('auto-builder-view').style.display = 'block';
  if (id) {
    const r = RULES_DATA.find(x => x.id === id); editRuleId = id;
    document.getElementById('builder-title').textContent = 'Edit Rule'; document.getElementById('rm-name').value = r.name; document.getElementById('rm-category').value = r.category; document.getElementById('rm-priority').value = r.priority; document.getElementById('rm-matchmode').value = r.match_mode; document.getElementById('rm-action').value = r.action; tempConditions = [...r.conditions];
  } else {
    editRuleId = null; document.getElementById('builder-title').textContent = 'New Rule'; document.getElementById('rm-name').value = ''; tempConditions = [{ field: 'request_type', op: 'eq', value: 'return' }];
  }
  renderConditions(); renderActionParams();
}

function closeBuilder() { document.getElementById('auto-builder-view').style.display = 'none'; document.getElementById('auto-list-view').style.display = 'block'; }

function renderConditions() {
  document.getElementById('rm-conditions-wrap').innerHTML = tempConditions.map((c, i) => `
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <select class="inp-field" onchange="tempConditions[${i}].field=this.value">
        <option value="request_type" ${c.field==='request_type'?'selected':''}>Request Type</option><option value="return_reason" ${c.field==='return_reason'?'selected':''}>Return Reason</option><option value="product_price" ${c.field==='product_price'?'selected':''}>Item Price</option><option value="carrier_event" ${c.field==='carrier_event'?'selected':''}>Carrier Event</option>
      </select>
      <select class="inp-field" onchange="tempConditions[${i}].op=this.value"><option value="eq" ${c.op==='eq'?'selected':''}>Is</option><option value="contains" ${c.op==='contains'?'selected':''}>Contains</option><option value="lt" ${c.op==='lt'?'selected':''}>Less than</option></select>
      <input class="inp-field" value="${c.value}" onchange="tempConditions[${i}].value=this.value">
      <button class="btn btn-danger" onclick="tempConditions.splice(${i},1);renderConditions()">✕</button>
    </div>`).join('');
}
function addCondition() { tempConditions.push({ field: 'return_reason', op: 'contains', value: '' }); renderConditions(); }

function renderActionParams() {
  const action = document.getElementById('rm-action').value;
  document.getElementById('rm-action-params').innerHTML = ['auto_approve', 'keep_it'].includes(action) ? `<div class="inp-wrap" style="margin-top:10px"><label class="inp-lbl">Message</label><input class="inp-field" id="rm-param-msg"></div>` : '';
}

async function saveRule() {
  const name = document.getElementById('rm-name').value; if (!name) return showToast('Name required', 'error');
  const payload = { name, category: document.getElementById('rm-category').value, priority: parseInt(document.getElementById('rm-priority').value), match_mode: document.getElementById('rm-matchmode').value, conditions: tempConditions, action: document.getElementById('rm-action').value, action_params: {} };
  if (document.getElementById('rm-param-msg')?.value) payload.action_params.message = document.getElementById('rm-param-msg').value;
  const res = await fetch(editRuleId ? `${BACKEND}/api/rules/${editRuleId}` : `${BACKEND}/api/rules`, { method: editRuleId ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).then(r => r.json());
  if (res.success) { showToast('Rule saved', 'success'); closeBuilder(); loadRules(); }
}

function showToast(msg, type) { const t=document.getElementById('toast'); t.textContent=msg; t.className='show '+type; setTimeout(()=>t.className='',2500); }

init();
</script>
</body>
</html>
